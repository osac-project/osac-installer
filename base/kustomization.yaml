apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: osac

metadata:
  name: osac-base

resources:
  - osac-aap/config/base
  - osac-operator/config/default
  - osac-fulfillment-service/manifests/overlays/openshift
  - hub-access

# Common labels for all OSAC components
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: osac

images:
- name: gomplate
  newName: docker.io/gomplate/gomplate
  newTag: latest
- name: postgres
  newName: quay.io/sclorg/postgresql-15-c9s
  newTag: latest
- name: ghcr.io/osac-project/fulfillment-service
  newTag: sha-37e8840
- name: osac-aap
  newName: ghcr.io/osac-project/osac-aap
  newTag: sha-86e2f56
- name: ghcr.io/osac-project/osac-operator
  newTag: sha-6701f0f
- name: envoy
  newName: docker.io/envoyproxy/envoy
  newTag: v1.33.0
- name: openshift-cli
  newName: image-registry.openshift-image-registry.svc:5000/openshift/cli
  newTag: latest

patches:
- target:
    kind: Namespace
    labelSelector: "control-plane=controller-manager"
  patch: |-
    apiVersion: v1
    kind: Namespace
    metadata:
      name: not-used
    $patch: delete

configurations:
- nameReference.yaml
