{{- if .Values.keycloakOperator.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: osac-operators-wait-keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-operators.hookLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: osac-operators-wait-keycloak
  labels:
    {{- include "osac-operators.hookLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "5"
rules:
  - apiGroups: ["operators.coreos.com"]
    resources: ["subscriptions", "clusterserviceversions", "installplans"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: osac-operators-wait-keycloak
  labels:
    {{- include "osac-operators.hookLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: osac-operators-wait-keycloak
subjects:
  - kind: ServiceAccount
    name: osac-operators-wait-keycloak
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: osac-operators-wait-keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-operators.hookLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "5"
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 1800
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "osac-operators.hookLabels" . | nindent 8 }}
    spec:
      serviceAccountName: osac-operators-wait-keycloak
      restartPolicy: OnFailure
      volumes:
        - name: tmp
          emptyDir: {}
        - name: scripts
          configMap:
            name: osac-operators-hook-scripts
      containers:
        - name: wait-keycloak
          image: {{ .Values.cliImage }}
          env:
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: scripts
              mountPath: /scripts
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          command:
            - /bin/bash
            - /scripts/wait-keycloak-operator.sh
{{- end }}
