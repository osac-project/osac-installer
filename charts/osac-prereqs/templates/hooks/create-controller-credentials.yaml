{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: osac-prereqs-create-creds
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-prereqs.hookLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "17"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: osac-prereqs-create-creds
  labels:
    {{- include "osac-prereqs.hookLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "17"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
- apiGroups: [""]
  resources: [secrets]
  resourceNames: [keycloak-client-secrets, fulfillment-controller-credentials]
  verbs: [get]
- apiGroups: [""]
  resources: [secrets]
  verbs: [create, patch]
- apiGroups: [""]
  resources: [namespaces]
  verbs: [get, create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: osac-prereqs-create-creds
  labels:
    {{- include "osac-prereqs.hookLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "17"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: osac-prereqs-create-creds
subjects:
- kind: ServiceAccount
  name: osac-prereqs-create-creds
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: osac-prereqs-create-creds
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-prereqs.hookLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "17"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: osac-prereqs-create-creds
      containers:
      - name: create-creds
        image: {{ .Values.cliImage }}
        command: ["/bin/bash", "/scripts/create-controller-credentials.sh"]
        env:
        - name: KEYCLOAK_NAMESPACE
          value: keycloak
        - name: OSAC_NAMESPACE
          value: {{ .Values.osacNamespace }}
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - "ALL"
        volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
      volumes:
      - name: scripts
        configMap:
          name: osac-prereqs-hook-scripts
          defaultMode: 0755
{{- end }}
