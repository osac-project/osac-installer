{{- if .Values.keycloak.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: osac-prereqs-realm-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-prereqs.hookLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  realm.json: |
{{ .Files.Get "files/realm.json" | indent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: osac-prereqs-import-realm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-prereqs.hookLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "15"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: osac-prereqs-import-realm
  labels:
    {{- include "osac-prereqs.hookLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "15"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
- apiGroups: [""]
  resources: [secrets]
  verbs: [get, create]
- apiGroups: ["k8s.keycloak.org"]
  resources: [keycloakrealmimports]
  verbs: [get, create, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: osac-prereqs-import-realm
  labels:
    {{- include "osac-prereqs.hookLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "15"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: osac-prereqs-import-realm
subjects:
- kind: ServiceAccount
  name: osac-prereqs-import-realm
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: osac-prereqs-import-realm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-prereqs.hookLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "15"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: osac-prereqs-import-realm
      containers:
      - name: import-realm
        image: {{ .Values.cliImage }}
        command: ["/bin/bash", "/scripts/import-realm.sh"]
        env:
        - name: HOME
          value: /tmp
        - name: KEYCLOAK_NAMESPACE
          value: keycloak
        - name: KEYCLOAK_CR_NAME
          value: osac-keycloak
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - "ALL"
        volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
        - name: realm-raw
          mountPath: /realm-raw
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: scripts
        configMap:
          name: osac-prereqs-hook-scripts
          defaultMode: 0755
      - name: realm-raw
        configMap:
          name: osac-prereqs-realm-data
      - name: tmp
        emptyDir: {}
{{- end }}
