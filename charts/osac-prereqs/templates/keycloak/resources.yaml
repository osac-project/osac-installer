{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-db-server-config
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
data:
  server.conf: |
{{ .Files.Get "files/server.conf" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-db-access-config
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
data:
  access.conf: |
{{ .Files.Get "files/access.conf" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
data:
  realm.json: |
{{ .Files.Get "files/realm.json" | indent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak-database
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keycloak-database
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keycloak-database
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: keycloak-database
subjects:
- kind: ServiceAccount
  name: keycloak-database
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-database
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-database-server
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
spec:
  issuerRef:
    kind: ClusterIssuer
    name: default-ca
  dnsNames:
  - localhost
  - keycloak-database
  secretName: keycloak-database-server-cert
  privateKey:
    rotationPolicy: Always
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-database-client
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
spec:
  issuerRef:
    kind: ClusterIssuer
    name: default-ca
  usages:
  - client auth
  commonName: keycloak
  secretName: keycloak-database-client-cert
  privateKey:
    encoding: PKCS8
    rotationPolicy: Always
  additionalOutputFormats:
  - type: DER
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-tls
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
spec:
  issuerRef:
    kind: ClusterIssuer
    name: default-ca
  dnsNames:
  - keycloak
  - keycloak.keycloak.svc.cluster.local
  - osac-keycloak-service
  - osac-keycloak-service.keycloak.svc.cluster.local
  secretName: keycloak-tls-cert
  privateKey:
    rotationPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-database
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
spec:
  selector:
    app: keycloak-database
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak-database
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: keycloak-database
  selector:
    matchLabels:
      app: keycloak-database
  template:
    metadata:
      labels:
        app: keycloak-database
    spec:
      serviceAccountName: keycloak-database
      volumes:
      - name: server-cert
        secret:
          secretName: keycloak-database-server-cert
          defaultMode: 0440
      - name: server-config
        configMap:
          name: keycloak-db-server-config
      - name: access-config
        configMap:
          name: keycloak-db-access-config
      - name: data
        persistentVolumeClaim:
          claimName: keycloak-database
      initContainers:
      - name: password-generator
        image: {{ .Values.cliImage }}
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          if ! oc get secret keycloak-database-password -n keycloak 2>/dev/null; then
              echo "generating postgresql password"
              password=$(openssl rand -hex 20)
              oc create secret generic keycloak-database-password \
                -n keycloak --from-literal POSTGRES_PASSWORD="$password"
              oc create secret generic keycloak-db-credentials \
                -n keycloak \
                --from-literal username=keycloak \
                --from-literal password="$password"
          fi
          if ! oc get secret keycloak-db-credentials -n keycloak 2>/dev/null; then
              echo "creating keycloak-db-credentials from existing password"
              password=$(oc get secret keycloak-database-password -n keycloak \
                -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 -d)
              oc create secret generic keycloak-db-credentials \
                -n keycloak \
                --from-literal username=keycloak \
                --from-literal password="$password"
          fi
      containers:
      - name: server
        image: {{ .Values.keycloak.images.postgres }}
        imagePullPolicy: IfNotPresent
        env:
        - name: POSTGRESQL_USER
          value: keycloak
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-database-password
              key: POSTGRES_PASSWORD
        - name: POSTGRESQL_DATABASE
          value: keycloak
        volumeMounts:
        - name: data
          mountPath: /var/lib/pgsql/data
        - name: server-cert
          mountPath: /secrets/cert
        - name: server-config
          mountPath: /opt/app-root/src/postgresql-cfg
        - name: access-config
          mountPath: /config/access
        ports:
        - name: postgres
          protocol: TCP
          containerPort: 5432
---
# Keycloak CR — operator-managed instance replacing the raw Deployment.
# The operator handles lifecycle, rolling updates, and health monitoring.
apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: osac-keycloak
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
spec:
  instances: 1
  db:
    vendor: postgres
    host: keycloak-database
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-credentials
      key: username
    passwordSecret:
      name: keycloak-db-credentials
      key: password
  http:
    tlsSecret: keycloak-tls-cert
  hostname:
    hostname: keycloak.keycloak.svc.cluster.local
  proxy:
    headers: xforwarded
---
# Proxy Service mapping port 443 to the operator's non-standard port 8443.
# JWT issuer URL (https://keycloak.keycloak.svc.cluster.local/realms/osac)
# must be reachable on the standard HTTPS port to match the "iss" claim.
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
    {{- include "osac-prereqs.labels" . | nindent 4 }}
spec:
  selector:
    app: keycloak
    app.kubernetes.io/instance: osac-keycloak
    app.kubernetes.io/managed-by: keycloak-operator
  ports:
  - name: https
    port: 443
    targetPort: 8443
    protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: osac-keycloak-service
  port:
    targetPort: https
  tls:
    termination: passthrough
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-password-setup
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
data:
  set-passwords.sh: |
    #!/bin/bash
    set -euo pipefail

    echo "Waiting for Keycloak to be ready..."
    for i in $(seq 1 120); do
      if curl -k -sf https://keycloak:443/realms/osac; then
        echo "Keycloak is ready!"
        break
      fi
      [[ $i -eq 120 ]] && { echo "ERROR: Keycloak not ready after 600s"; exit 1; }
      sleep 5
    done

    set_password() {
      local username=$1
      local password=$2

      TOKEN=$(curl -k -sf -X POST https://keycloak:443/realms/master/protocol/openid-connect/token \
        -H 'Content-Type: application/x-www-form-urlencoded' \
        -d 'grant_type=password' \
        -d 'client_id=admin-cli' \
        -d "username=${KEYCLOAK_ADMIN}" \
        -d "password=${KEYCLOAK_ADMIN_PASSWORD}" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
      [[ -n "${TOKEN}" ]] || { echo "ERROR: Could not get admin token"; return 1; }

      USER_ID=$(curl -k -sf -X GET "https://keycloak:443/admin/realms/osac/users?username=$username" \
        -H "Authorization: Bearer $TOKEN" | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
      [[ -n "${USER_ID}" ]] || { echo "ERROR: Could not find user: $username"; return 1; }

      curl -k -sf -X PUT "https://keycloak:443/admin/realms/osac/users/$USER_ID/reset-password" \
        -H "Authorization: Bearer $TOKEN" \
        -H "Content-Type: application/json" \
        -d "{\"type\":\"password\",\"value\":\"$password\",\"temporary\":false}"

      echo "Set password for $username"
    }

    echo "Setting passwords for all tenant users..."
    set_password "tenant1_admin" "foobar"
    set_password "tenant1_user" "foobar"
    set_password "tenant2_admin" "foobar"
    set_password "tenant2_user" "foobar"
    set_password "twotenant" "foobar"
    set_password "my_user" "foobar"
    set_password "your_user" "foobar"

    echo "All passwords set to 'foobar'"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-set-passwords
  namespace: keycloak
  labels:
    {{- include "osac-prereqs.hookLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "16"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: set-passwords
        image: {{ .Values.cliImage }}
        command:
        - /bin/bash
        - /scripts/set-passwords.sh
        env:
        - name: HOME
          value: /tmp
        - name: KEYCLOAK_ADMIN
          valueFrom:
            secretKeyRef:
              name: osac-keycloak-initial-admin
              key: username
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: osac-keycloak-initial-admin
              key: password
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - "ALL"
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: scripts
        configMap:
          name: keycloak-password-setup
          defaultMode: 0755
      - name: tmp
        emptyDir: {}
{{- end }}
