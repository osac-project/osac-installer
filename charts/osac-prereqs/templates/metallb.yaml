{{- if .Values.metallb.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: osac-prereqs-metallb-config
  labels:
    {{- include "osac-prereqs.labels" . | nindent 4 }}
data:
  config.yaml: |
    apiVersion: metallb.io/v1beta1
    kind: MetalLB
    metadata:
      name: metallb
      namespace: metallb-system
    ---
    apiVersion: metallb.io/v1beta1
    kind: IPAddressPool
    metadata:
      name: caas-address-pool
      namespace: metallb-system
    spec:
      addresses:
        - 192.168.100.240-192.168.100.250
      autoAssign: true
      avoidBuggyIPs: true
    ---
    apiVersion: metallb.io/v1beta1
    kind: L2Advertisement
    metadata:
      name: caas-l2-advertisement
      namespace: metallb-system
    spec:
      ipAddressPools:
        - caas-address-pool
{{- end }}
