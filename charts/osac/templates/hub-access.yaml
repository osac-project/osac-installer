{{- if .Values.hubAccess.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hub-access
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: hub-access
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/service-account.name: hub-access
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hub-access
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-hub-access
subjects:
  - kind: ServiceAccount
    name: hub-access
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-hub-access-hosted-clusters
  labels:
    {{- include "osac.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - hypershift.openshift.io
    resources:
      - hostedclusters
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-hub-access-hosted-clusters
  labels:
    {{- include "osac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-hub-access-hosted-clusters
subjects:
  - kind: ServiceAccount
    name: hub-access
    namespace: {{ .Release.Namespace }}
{{- end }}
