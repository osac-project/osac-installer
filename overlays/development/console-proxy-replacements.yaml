# Propagates the console-proxy deployment namespace from the SA annotation
# into embedded references that kustomize's namespace transformer cannot
# reach (APIService spec, cert-manager annotation, Certificate dnsNames).
# Must be declared at the overlay level -- Component-level replacements
# run before the namespace transformer, so they read pre-transformer
# values and produce wrong results when the overlay changes namespace.
- source:
    kind: ServiceAccount
    name: osac-console-proxy
    fieldPath: metadata.annotations.osac\.openshift\.io/deployment-namespace
  targets:
  - select:
      labelSelector: "app=osac-console-proxy"
    reject:
    - kind: APIService
    - kind: ClusterRole
    - kind: ClusterRoleBinding
    fieldPaths:
    - metadata.namespace
  - select:
      kind: APIService
      name: v1alpha1.console.osac.openshift.io
    fieldPaths:
    - spec.service.namespace
  - select:
      kind: APIService
      name: v1alpha1.console.osac.openshift.io
    fieldPaths:
    - metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: '/'
      index: 0
  - select:
      kind: Certificate
      name: osac-console-proxy
    fieldPaths:
    - spec.dnsNames.1
    - spec.dnsNames.2
    - spec.dnsNames.3
    options:
      delimiter: '.'
      index: 1
  - select:
      kind: RoleBinding
      name: osac-console-proxy-auth-reader
    fieldPaths:
    - subjects.0.namespace
# Restore auth-reader RoleBinding to kube-system (namespace transformer overwrites it)
- source:
    kind: RoleBinding
    name: osac-console-proxy-auth-reader
    fieldPath: metadata.annotations.osac\.openshift\.io/deployment-namespace
  targets:
  - select:
      kind: RoleBinding
      name: osac-console-proxy-auth-reader
    fieldPaths:
    - metadata.namespace
# Propagates the fulfillment-api namespace into the ingress-proxy certificate
# dnsNames so the cert covers the namespace-qualified FQDNs used by the
# console-proxy JWKS fetch and by in-cluster clients.
- source:
    kind: Service
    name: fulfillment-api
    fieldPath: metadata.namespace
  targets:
  - select:
      kind: Certificate
      name: fulfillment-api
    fieldPaths:
    - spec.dnsNames.2
    - spec.dnsNames.3
    - spec.dnsNames.5
    - spec.dnsNames.6
    options:
      delimiter: '.'
      index: 1
