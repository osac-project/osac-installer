# --- Prerequisites ---
certManager:
  enabled: true
trustManager:
  enabled: true
caIssuer:
  enabled: true
keycloak:
  enabled: true
aapOperator:
  enabled: true
lvms:
  enabled: true
metallb:
  enabled: true
cnv:
  enabled: false
mce:
  enabled: true
  osImages:
    - openshiftVersion: "4.22"
      version: "9.8.20260428-0"
      url: "https://mirror.openshift.com/pub/openshift-v4/x86_64/dependencies/rhcos/4.22/4.22.0/rhcos-4.22.0-x86_64-live-iso.x86_64.iso"
      cpuArchitecture: "x86_64"

# OSAC CaaS (Cluster-as-a-Service) CI Environment Values
# CaaS CI values

# --- Operator ---
operator:
  image:
    repository: ghcr.io/osac-project/osac-operator
    tag: sha-0c4a76a
    pullPolicy: Always
  provisioning:
    provider: "aap"
  aap:
    insecureSkipVerify: "true"
    tokenSecret:
      name: osac-aap-api-token
      key: token
  fulfillment:
    serverAddress: "fulfillment-internal-api:8001"
    tokenFile: "/var/run/secrets/kubernetes.io/serviceaccount/token"
  controllers:
    clusterOrder: true
    computeInstance: false
    tenant: true
    networking: true
    storage: true
  hubAccess:
    enabled: true
  tenants:
  - name: shared
  - name: osac-e2e-ci

# --- Fulfillment Service ---
service:
  variant: openshift
  externalHostname: ""  # Set to fulfillment-api-<namespace>.apps.<cluster>.<domain>
  internalHostname: ""  # Set to fulfillment-internal-api-<namespace>.apps.<cluster>.<domain>
  images:
    service: ghcr.io/osac-project/fulfillment-service:sha-2151630
    envoy: ghcr.io/osac-project/envoy:v1.33.0
  certs:
    issuerRef:
      kind: ClusterIssuer
      name: default-ca
    caBundle:
      configMap: ca-bundle
  auth:
    issuerUrl: https://keycloak.keycloak.svc.cluster.local/realms/osac
    emergencyServiceAccounts:
    - admin
    - osac-operator
    - osac-operator-controller-manager
    - template-publisher
    controllerCredentials:
    - secret:
        name: fulfillment-controller-credentials
        items:
        - key: client-id
          param: client-id
        - key: client-secret
          param: client-secret
  idp:
    provider: keycloak
    url: https://keycloak.keycloak.svc.cluster.local
    credentials:
    - secret:
        name: fulfillment-controller-credentials
        items:
        - key: client-id
          param: client-id
        - key: client-secret
          param: client-secret
  database:
    connection:
    - secret:
        name: fulfillment-db
        items:
        - key: url
          param: url
    - secret:
        name: postgres-client-cert-service
        items:
        - key: tls.crt
          param: sslcert
        - key: tls.key
          param: sslkey
        - key: ca.crt
          param: sslrootcert
  log:
    level: debug

# --- AAP ---
aap:
  aap:
    instance:
      enabled: true
      name: "osac-aap"
  bootstrap:
    enabled: true
    image: ghcr.io/osac-project/osac-aap:sha-eb0e6ae
    backoffLimit: 15
  configAsCode:
    manifestSecret: "config-as-code-manifest-ig"
    secret: "config-as-code-ig"
    eeImage: "ghcr.io/osac-project/osac-aap:sha-eb0e6ae"
    projectGitUri: "https://github.com/osac-project/osac-aap"
    projectGitBranch: "eb0e6ae884e4860d5b380d6923a06811e4c129b7"
  instanceGroups:
    clusterFulfillment:
      enabled: true
      config:
        NETWORK_STEPS_COLLECTION: "ci.steps"
        HOSTED_CLUSTER_CONTROLLER_AVAILABILITY_POLICY: "SingleReplica"
        HOSTED_CLUSTER_INFRASTRUCTURE_AVAILABILITY_POLICY: "SingleReplica"
    networkFulfillment:
      enabled: true

# --- Validation ---
validation:
  enabled: true

# --- Bare Metal Fulfillment Operator ---
bmf:
  enabled: false
  image:
    repository: ghcr.io/osac-project/bare-metal-fulfillment-operator
    tag: sha-d28b3ca
    pullPolicy: Always

# --- Cluster Versions ---
clusterVersions:
  enabled: true
  versions:
  - version: "4.20.0"
    image: "quay.io/openshift-release-dev/ocp-release:4.20.0-multi"
  - version: "4.22.0"
    image: "quay.io/openshift-release-dev/ocp-release:4.22.0-multi"
    default: true

# --- CI/dev only ---
# Hub access: registers local cluster as a hub. Only for environments
# where the fulfillment service and hub cluster are the same.
hubAccess:
  enabled: true

# Bundled PostgreSQL: single-pod ephemeral database for testing.
# Uses fsync=off — data is lost on restart. Not for production.
bundledPostgres:
  enabled: true
  database:
    name: service
