# --- Prerequisites ---
certManager:
  enabled: true
trustManager:
  enabled: true
caIssuer:
  enabled: true
keycloak:
  enabled: true
aapOperator:
  enabled: true
lvms:
  enabled: false
metallb:
  enabled: false
cnv:
  enabled: false
mce:
  enabled: false

# OSAC Development Environment Values
# Development values

# --- Operator ---
operator:
  image:
    repository: ghcr.io/osac-project/osac-operator
    tag: latest
    pullPolicy: Always
  provisioning:
    provider: "aap"
  aap:
    url: ""
    insecureSkipVerify: "true"
    statusPollInterval: "30s"
    templatePrefix: "osac"
  fulfillment:
    serverAddress: "fulfillment-internal-api:8001"
    tokenFile: "/var/run/secrets/kubernetes.io/serviceaccount/token"
  controllers:
    clusterOrder: true
    computeInstance: true
    tenant: true
    networking: true

# --- Fulfillment Service ---
service:
  variant: openshift
  externalHostname: ""  # Set to fulfillment-api-<namespace>.apps.<cluster>.<domain>
  internalHostname: ""  # Set to fulfillment-internal-api-<namespace>.apps.<cluster>.<domain>
  images:
    service: ghcr.io/osac-project/fulfillment-service:latest
    envoy: ghcr.io/osac-project/envoy:v1.33.0
  certs:
    issuerRef:
      kind: ClusterIssuer
      name: default-ca
    caBundle:
      configMap: ca-bundle
  auth:
    issuerUrl: https://keycloak.keycloak.svc.cluster.local/realms/osac
    emergencyServiceAccounts:
    - admin
    - osac-operator
    - osac-operator-controller-manager
    - template-publisher
    controllerCredentials:
    - secret:
        name: fulfillment-controller-credentials
        items:
        - key: client-id
          param: client-id
        - key: client-secret
          param: client-secret
  idp:
    provider: keycloak
    url: https://keycloak.keycloak.svc.cluster.local
    credentials:
    - secret:
        name: fulfillment-controller-credentials
        items:
        - key: client-id
          param: client-id
        - key: client-secret
          param: client-secret
  database:
    connection:
    - secret:
        name: fulfillment-db
        items:
        - key: url
          param: url
    - secret:
        name: postgres-client-cert-service
        items:
        - key: tls.crt
          param: sslcert
        - key: tls.key
          param: sslkey
        - key: ca.crt
          param: sslrootcert
  log:
    level: info

# --- UI ---
ui:
  enabled: true
  images:
    ui: ghcr.io/osac-project/osac-ui:latest
  api:
    fulfillment:
      certs:
        caBundle:
          configMap: ca-bundle
  auth:
    certs:
      caBundle:
        configMap: ca-bundle

# --- AAP ---
aap:
  aap:
    instance:
      enabled: true
      name: "osac-aap"
  bootstrap:
    enabled: true
    image: ghcr.io/osac-project/osac-aap:latest
    backoffLimit: 15
  instanceGroups:
    clusterFulfillment:
      enabled: true
      config:
        NETWORK_CLASS: "esi"
        NETWORK_STEPS_COLLECTION: "osac.steps"
        EXTERNAL_ACCESS_BASE_DOMAIN: "box.massopen.cloud"
        EXTERNAL_ACCESS_SUPPORTED_BASE_DOMAINS: "box.massopen.cloud"
        EXTERNAL_ACCESS_API_INTERNAL_NETWORK: "hypershift"
        HOSTED_CLUSTER_BASE_DOMAIN: "box.massopen.cloud"
        HOSTED_CLUSTER_CONTROLLER_AVAILABILITY_POLICY: "HighlyAvailable"
        HOSTED_CLUSTER_INFRASTRUCTURE_AVAILABILITY_POLICY: "HighlyAvailable"
    networkFulfillment:
      enabled: true
      config:
        NETRIS_CONTROLLER_URL: "https://redhat-ctl.netris.io"
        NETRIS_USERNAME: "netris"
        NETRIS_SITE_ID: "5"
        NETRIS_TENANT_ID: "1"
        NETRIS_TENANT_NAME: "Admin"

# --- Validation ---
validation:
  enabled: true

# --- ClusterVersion Seeding ---
clusterVersions:
  enabled: true
  versions:
  - version: "4.20.0"
    image: "quay.io/openshift-release-dev/ocp-release:4.20.0-multi"
  - version: "4.22.0"
    image: "quay.io/openshift-release-dev/ocp-release:4.22.0-multi"
    default: true
